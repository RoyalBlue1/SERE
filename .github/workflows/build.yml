# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
    push:
        branches: ["*"]
    pull_request:
        branches: ["*"]

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
            fail-fast: false

            # Set up a matrix to run the following 3 configurations:
            # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
            # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
            #
            # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
            matrix:
                os: [ubuntu-latest, windows-latest]
                build_type: [Release]
                c_compiler: [clang, cl]
                include:
                    - os: windows-latest
                      c_compiler: cl
                      cpp_compiler: cl
                    - os: ubuntu-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                exclude:
                    - os: windows-latest
                      c_compiler: clang
                    - os: ubuntu-latest
                      c_compiler: cl

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Set reusable strings
              id: strings
              shell: bash
              run: |
                  echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
                  echo "package-output-dir=${{ github.workspace }}/build-package" >> "$GITHUB_OUTPUT"

            - name: Setup linux deps
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install build-essential git make \
                    pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
                    libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
                    libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
                    libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
                    libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

            - name: Configure CMake
              # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
              # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
              run: >
                  cmake -B ${{ steps.strings.outputs.build-output-dir }}
                  -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
                  -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
                  -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
                  -S ${{ github.workspace }}

            - name: Build
              # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
              run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

            - name: Package build output (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'

                  $buildDir = '${{ steps.strings.outputs.build-output-dir }}'
                  $packageDir = '${{ steps.strings.outputs.package-output-dir }}'

                  if (Test-Path -LiteralPath $packageDir) {
                      Remove-Item -LiteralPath $packageDir -Recurse -Force
                  }
                  New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

                  $exe = Get-ChildItem -Path $buildDir -Filter 'SERE.exe' -Recurse -File |
                      Where-Object { $_.FullName -like "*\${{ matrix.build_type }}\SERE.exe" } |
                      Select-Object -First 1
                  if (-not $exe) {
                      $exe = Get-ChildItem -Path $buildDir -Filter 'SERE.exe' -Recurse -File | Select-Object -First 1
                  }
                  if (-not $exe) {
                      throw "SERE.exe was not found under $buildDir"
                  }

                  Copy-Item -LiteralPath $exe.FullName -Destination $packageDir -Force
                  Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'SERE\Assets') -Destination (Join-Path $packageDir 'Assets') -Recurse -Force

                  $imguiDir = Join-Path $packageDir 'imgui'
                  New-Item -ItemType Directory -Force -Path $imguiDir | Out-Null
                  Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'SERE\Imgui\DroidSans.ttf') -Destination (Join-Path $imguiDir 'DroidSans.ttf') -Force

                  $sdlLibs = Get-ChildItem -Path $buildDir -Filter 'SDL3.dll' -Recurse -File
                  if (-not $sdlLibs) {
                      throw "SDL3.dll was not found under $buildDir"
                  }
                  $sdlLibs | Copy-Item -Destination $packageDir -Force

                  Get-ChildItem -Path $packageDir -Recurse -File | ForEach-Object { $_.FullName }

            - name: Package build output (Linux)
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  set -euo pipefail

                  build_dir="${{ steps.strings.outputs.build-output-dir }}"
                  package_dir="${{ steps.strings.outputs.package-output-dir }}"

                  rm -rf "$package_dir"
                  mkdir -p "$package_dir"

                  exe_path="$(find "$build_dir" -type f -name SERE -perm /111 -print -quit)"
                  if [[ -z "$exe_path" ]]; then
                    exe_path="$(find "$build_dir" -type f -name SERE -print -quit)"
                  fi
                  if [[ -z "$exe_path" ]]; then
                    echo "SERE executable was not found under $build_dir"
                    exit 1
                  fi

                  cp "$exe_path" "$package_dir/"
                  chmod +x "$package_dir/$(basename "$exe_path")"
                  cp -R "$GITHUB_WORKSPACE/SERE/Assets" "$package_dir/Assets"

                  mkdir -p "$package_dir/imgui"
                  cp "$GITHUB_WORKSPACE/SERE/Imgui/DroidSans.ttf" "$package_dir/imgui/DroidSans.ttf"

                  mapfile -t sdl_libs < <(find "$build_dir" \( -type f -o -type l \) \( -name 'libSDL3*.so*' -o -name 'SDL3*.so*' -o -name 'libSDL3*.dylib' \) -print)
                  if (( ${#sdl_libs[@]} == 0 )); then
                    echo "SDL shared libraries were not found under $build_dir"
                    exit 1
                  fi

                  for lib in "${sdl_libs[@]}"; do
                    cp -L "$lib" "$package_dir/$(basename "$lib")"
                  done

                  find "$package_dir" -type f -print | sort

            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  path: ${{ steps.strings.outputs.package-output-dir }}/
                  name: SERE-${{ matrix.os }}-${{ matrix.build_type }}
                  if-no-files-found: error
